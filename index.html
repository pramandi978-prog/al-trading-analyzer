<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Analyzer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="background:black; color:white; text-align:center; font-family:Arial;">

    <h1 class="mt-4">AI Forex & Crypto Analyzer</h1>

    <div class="mt-4">
        <select id="pair" class="form-select w-25 mx-auto">
            <option>BTCUSDT</option>
            <option>ETHUSDT</option>
            <option>EURUSD</option>
            <option>GBPUSD</option>
        </select>
    </div>

    <div class="mt-4">
        <button class="btn btn-primary" onclick="analyze()">Analyze</button>
    </div>

    <div id="result" class="mt-4"></div>

    <!-- JS FILE -->
    <script src="script.js"></script>

</body>
</html>
