<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trading Analyzer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container text-center mt-5">
    <h1>AI Trading Analyzer</h1>

    <!-- SEARCH (IMPORTANT: id must match JS) -->
    <input 
        type="text" 
        id="search" 
        class="form-control w-25 mx-auto mt-3" 
        placeholder="Search pair..."
    >

    <!-- DROPDOWN (AUTO FILLED FROM BINANCE) -->
    <select id="pair" class="form-select w-25 mx-auto mt-3"></select>

    <!-- BUTTON -->
    <button class="btn btn-primary mt-3" onclick="analyze()">Analyze</button>

    <!-- LOADING TEXT -->
    <div id="loading" class="mt-3 text-warning"></div>

    <!-- RESULTS -->
    <div id="result" class="mt-4"></div>
</div>

<!-- SCRIPT (VERY IMPORTANT: must be at bottom) -->
<script src="script.js"></script>

</body>
</html>
